edition: 3.0.0
name: fabricverify-app
access: default

vars:
  region: "cn-hangzhou"
  functionName: "fabricverify-ui"

resources:
  framework:
    component: fc3
    actions:
      pre-deploy:
        - run: npm install
          path: ./
        - run: npm run build
          path: ./
    props:
      region: ${vars.region}
      functionName: ${vars.functionName}
      description: 'Fabric Verify Web App'
      runtime: custom
      timeout: 60
      memorySize: 512
      cpu: 0.5
      diskSize: 512
      code: ./
      customRuntimeConfig:
        command:
          - npm
        args:
          - run
          - start
      environmentVariables:
        PORT: '9000'
        DASHSCOPE_API_KEY: 'sk-4ed762723e8d48cd9884a05497bd5c2e'
        GEMINI_API_KEY: 'AIzaSyDgj38jhac20WhoFPetEhGaNtQZ_SCm9EU'
      triggers:
        - triggerName: defaultTrigger
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
              - PUT
              - DELETE
              - HEAD
              - OPTIONS
